<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flink PTF Demo</title>

    <!-- React + Babel from CDN; no build step required. -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

    <style>
      :root {
        --bg: #0f1424;
        --panel: #181f36;
        --panel-2: #1f2742;
        --text: #e7eaf3;
        --muted: #8c95b3;
        --accent: #6f8cff;
        --accent-2: #ff7ab6;
        --click: #58e6a4;
        --summary: #ffb86b;
        --border: #283057;
        --shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        --radius: 12px;
      }
      * { box-sizing: border-box; }
      html, body, #root {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px 800px at 70% -10%, #1d2750 0%, var(--bg) 60%);
        color: var(--text);
      }
      button { font: inherit; }
      input  { font: inherit; }
      code   { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 0.85em; }
      .muted { color: var(--muted); font-size: 0.92em; }
      .error { color: #ff8a8a; margin-top: 0.5rem; font-size: 0.9em; }

      .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
      .login-card {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 2rem; width: 100%; max-width: 380px; box-shadow: var(--shadow);
      }
      .login-card h1 { margin: 0 0 0.25rem; font-size: 1.4rem; }
      .login-card input {
        width: 100%; margin-top: 1rem; padding: 0.7rem 0.9rem;
        background: var(--panel-2); border: 1px solid var(--border);
        border-radius: 8px; color: var(--text); outline: none;
      }
      .login-card input:focus { border-color: var(--accent); }
      .login-card button {
        width: 100%; margin-top: 0.8rem; padding: 0.7rem 0.9rem;
        background: var(--accent); border: none; border-radius: 8px;
        color: white; font-weight: 600; cursor: pointer;
      }
      .login-card button:hover { filter: brightness(1.07); }
      .login-card button:disabled { opacity: 0.5; cursor: wait; }

      .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
      .topbar {
        display: flex; justify-content: space-between; align-items: center;
        padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border);
        background: rgba(15, 20, 36, 0.75); backdrop-filter: blur(8px);
      }
      .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 600; }
      .brand-dot {
        width: 10px; height: 10px; border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 12px rgba(111, 140, 255, 0.6);
      }
      .user-info { display: flex; align-items: center; gap: 1rem; }
      .link-btn {
        background: transparent; color: var(--muted); border: 1px solid var(--border);
        border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer;
      }
      .link-btn:hover { color: var(--text); border-color: var(--accent); }

      .main {
        flex: 1; min-height: 0;
        display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
        gap: 1.25rem; padding: 1.25rem;
      }
      @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
      .panel {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 1.25rem; box-shadow: var(--shadow);
        display: flex; flex-direction: column; min-height: 0;
      }
      .panel h2 { margin: 0 0 0.25rem; font-size: 1.1rem; }
      .panel p  { margin: 0 0 1rem; }

      .product-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.9rem; }
      @media (max-width: 600px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
      .product-tile {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0.35rem; padding: 1.1rem 0.6rem;
        background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
        color: var(--text); cursor: pointer;
        transition: transform 0.08s ease, border-color 0.15s ease, background 0.15s ease;
      }
      .product-tile:hover { border-color: var(--accent); background: #232c50; }
      .product-tile.is-clicked { transform: scale(0.94); border-color: var(--accent-2); }
      .product-tile .emoji { font-size: 2.1rem; line-height: 1; }
      .product-tile .label { font-size: 0.88rem; color: var(--muted); }

      .streams {
        display: grid; grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        gap: 1rem; flex: 1; min-height: 0;
      }
      .stream-block {
        background: var(--panel-2); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 0.75rem 0.9rem; display: flex; flex-direction: column; min-height: 0;
      }
      .stream-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
      .stream-header h3 { margin: 0; font-size: 0.95rem; }
      .stream-header .topic { color: var(--muted); margin-left: auto; }
      .badge { font-size: 1.2em; line-height: 0; }
      .badge-click   { color: var(--click); }
      .badge-summary { color: var(--summary); }
      .empty {
        color: var(--muted); font-size: 0.9em; padding: 0.75rem;
        border: 1px dashed var(--border); border-radius: 8px; text-align: center;
      }
      .event-list { list-style: none; margin: 0; padding: 0; overflow-y: auto; flex: 1; }
      .event {
        display: flex; gap: 0.6rem; padding: 0.45rem 0.55rem;
        border-bottom: 1px solid var(--border); font-size: 0.9rem;
      }
      .event:last-child { border-bottom: none; }
      .event .time { color: var(--muted); font-variant-numeric: tabular-nums; }
      .event .who  { color: var(--accent); font-weight: 600; min-width: 4rem; }
      .event .what { color: var(--text); }
      .event-summary { flex-direction: column; gap: 0.4rem; }
      .summary-head { display: flex; gap: 0.6rem; }
      .summary-body { display: flex; flex-wrap: wrap; gap: 0.35rem; padding-left: 0.1rem; }
      .chip {
        display: inline-flex; align-items: center; gap: 0.25rem;
        background: rgba(255, 184, 107, 0.12); border: 1px solid rgba(255, 184, 107, 0.35);
        color: #ffd5a5; padding: 0.15rem 0.55rem; border-radius: 999px; font-size: 0.82rem;
      }
      .chip strong { color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
      const { useEffect, useState } = React;

      const STORAGE_KEY = "flink-ptf-demo:user";
      const MAX_ITEMS = 50;

      const PRODUCTS = [
        { id: "p001", name: "Pizza",     emoji: "🍕" },
        { id: "p002", name: "Burger",    emoji: "🍔" },
        { id: "p003", name: "Sushi",     emoji: "🍣" },
        { id: "p004", name: "Coffee",    emoji: "☕" },
        { id: "p005", name: "Ice Cream", emoji: "🍦" },
        { id: "p006", name: "Croissant", emoji: "🥐" },
        { id: "p007", name: "Donut",     emoji: "🍩" },
        { id: "p008", name: "Taco",      emoji: "🌮" },
      ];

      const fmtTime = (ms) => (ms ? new Date(ms).toLocaleTimeString() : "—");
      const fmtTimeMs = (ms) => {
        if (!ms) return "—";
        const d = new Date(ms);
        return d.toLocaleTimeString() + "." + String(d.getMilliseconds()).padStart(3, "0");
      };

      function useEventSource(url, user) {
        const [items, setItems] = useState([]);
        useEffect(() => {
          if (!user) return;
          const urlWithUser = `${url}?user=${encodeURIComponent(user)}`;
          const es = new EventSource(urlWithUser);
          es.onmessage = (ev) => {
            try {
              const parsed = JSON.parse(ev.data);
              setItems((prev) => [parsed, ...prev].slice(0, MAX_ITEMS));
            } catch { /* ignore malformed */ }
          };
          es.onerror = () => console.warn(`SSE error on ${url}`);
          return () => es.close();
        }, [url, user]);
        return items;
      }

      function Login({ onLogin }) {
        const [name, setName] = useState("");
        const [submitting, setSubmitting] = useState(false);
        const [error, setError] = useState(null);

        const submit = async (e) => {
          e.preventDefault();
          const trimmed = name.trim();
          if (!trimmed) { setError("Please enter a name."); return; }
          setSubmitting(true); setError(null);
          try {
            const res = await fetch("/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ name: trimmed }),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            onLogin(trimmed);
          } catch (err) {
            setError(`Login failed: ${err.message}`);
          } finally {
            setSubmitting(false);
          }
        };

        return (
          <div className="login-screen">
            <form className="login-card" onSubmit={submit}>
              <h1>Confluent Cloud for Apache Flink: PTF Demo</h1>
              <p className="muted">Enter a name to start clicking.</p>
              <input
                autoFocus type="text" placeholder="clarice"
                value={name} onChange={(e) => setName(e.target.value)}
                disabled={submitting}
              />
              <button type="submit" disabled={submitting}>
                {submitting ? "…" : "Enter"}
              </button>
              {error && <div className="error">{error}</div>}
            </form>
          </div>
        );
      }

      function ProductGrid({ user }) {
        const [busyId, setBusyId] = useState(null);
        const [error, setError] = useState(null);

        const click = async (p) => {
          setBusyId(p.id); setError(null);
          try {
            const res = await fetch("/click", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ user, product_id: p.id, product_name: p.name }),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
          } catch (err) {
            setError(`Click failed: ${err.message}`);
          } finally {
            setTimeout(() => setBusyId(null), 120);
          }
        };

        return (
          <>
            <div className="product-grid">
              {PRODUCTS.map((p) => (
                <button
                  key={p.id}
                  className={`product-tile ${busyId === p.id ? "is-clicked" : ""}`}
                  onClick={() => click(p)}
                >
                  <span className="emoji" aria-hidden>{p.emoji}</span>
                  <span className="label">{p.name}</span>
                </button>
              ))}
            </div>
            {error && <div className="error">{error}</div>}
          </>
        );
      }

      function EventStream({ user }) {
        const clicks = useEventSource("/stream/clicks", user);
        const summaries = useEventSource("/stream/summaries", user);

        return (
          <div className="streams">
            <div className="stream-block">
              <div className="stream-header">
                <span className="badge badge-click">●</span>
                <h3>Clicks</h3>
                <code className="topic">user-clicks</code>
              </div>
              {clicks.length === 0 ? (
                <div className="empty">Waiting for clicks…</div>
              ) : (
                <ul className="event-list">
                  {clicks.map((c, i) => (
                    <li key={i} className="event event-click">
                      <span className="time">{fmtTimeMs(c.click_ts)}</span>
                      <span className="who">{c.user}</span>
                      <span className="what">→ {c.product_name}</span>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            <div className="stream-block">
              <div className="stream-header">
                <span className="badge badge-summary">●</span>
                <h3>Inactivity summaries</h3>
                <code className="topic">user-clicks-summary</code>
              </div>
              {summaries.length === 0 ? (
                <div className="empty">
                  No summaries yet. Click some products, then stop for ~10 s.
                </div>
              ) : (
                <ul className="event-list">
                  {summaries.map((s, i) => {
                    // Parse "Product1:Count1, Product2:Count2" format
                    const products = s.clicks_summary ? s.clicks_summary.split(", ").map(p => {
                      const [name, count] = p.split(":");
                      return { name, count: parseInt(count) || 0 };
                    }) : [];
                    
                    return (
                      <li key={i} className="event event-summary">
                        <div className="summary-head">
                          <span className="time">{fmtTimeMs(s.detected_at)}</span>
                          <span className="who">{s.user}</span>
                        </div>
                        <div className="summary-body">
                          {products.map((p, j) => (
                            <span key={j} className="chip">
                              {p.name}: <strong>{p.count}</strong>
                            </span>
                          ))}
                        </div>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
          </div>
        );
      }

      function App() {
        const [user, setUser] = useState(null);

        useEffect(() => {
          const cached = localStorage.getItem(STORAGE_KEY);
          if (cached) setUser(cached);
        }, []);

        const handleLogin = (name) => {
          localStorage.setItem(STORAGE_KEY, name);
          setUser(name);
        };
        const handleLogout = () => {
          localStorage.removeItem(STORAGE_KEY);
          setUser(null);
        };

        if (!user) return <Login onLogin={handleLogin} />;

        return (
          <div className="app">
            <header className="topbar">
              <div className="brand">
                <span className="brand-dot" />
                <span>Flink PTF Demo</span>
              </div>
              <div className="user-info">
                <span>Welcome, <strong>{user}</strong></span>
                <button className="link-btn" onClick={handleLogout}>Log out</button>
              </div>
            </header>
            <main className="main">
              <section className="panel">
                <h2>Click a product</h2>
                <p className="muted">
                  Each click produces an Avro message to <code>user-clicks</code>.
                </p>
                <ProductGrid user={user} />
              </section>
              <section className="panel">
                <h2>Live events</h2>
                <p className="muted">
                  Two SSE streams from Flask, fed by background Kafka consumers.
                </p>
                <EventStream user={user} />
              </section>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
